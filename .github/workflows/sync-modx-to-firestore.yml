# Incremental MODX → Firestore sync (scripts/sync-modx-to-firestore.mjs).
#
# Required repository secrets:
#   MODXDB_HOST, MODXDB_USER, MODXDB_DATABASE, MODXDB_PASSWORD
#   FIREBASE_ADMIN_KEY  — Firebase service account JSON (single line)
#   FIREBASE_STORAGE_BUCKET
#   CPANEL_URL          — cPanel HTTPS API base, e.g. https://example.com:2083
#   CPANEL_USER         — cPanel account username (API token owner)
#   CPANEL_TOKEN        — cPanel API token (e.g. GitHubActions)
#
# Optional secrets:
#   MODXDB_PORT              (default 3306 in the sync script)
#   MODX_ASSET_ORIGIN        (default https://www.diabetes.hu/)
#   NETLIFY_SITE_ID, NETLIFY_ACCESS_TOKEN  (edge-cache purge after changes)

name: Sync MODX to Firestore

on:
  workflow_dispatch:
    inputs:
      full_backfill:
        description: 'Run full backfill (--full) instead of incremental sync'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      modx_doc_id:
        description: 'MODX site_content id from save trigger (forces removal check when unpublished)'
        required: false
        default: ''
        type: string

concurrency:
  group: modx-firestore-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # Allow → sync → revoke must stay in this single job so revoke can read
  # steps.cpanel_mysql.outputs.ip (step outputs are not visible across jobs).
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Allow GitHub Actions runner IP in cPanel Remote MySQL
        id: cpanel_mysql
        env:
          CPANEL_URL: ${{ secrets.CPANEL_URL }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: |
          set -euo pipefail
          RUNNER_IP="$(curl -4 -fsS https://api.ipify.org)"
          echo "ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          bash scripts/cpanel-remote-mysql-ip.sh add "${RUNNER_IP}"

      - name: Wait for Remote MySQL ACL propagation
        run: sleep 5

      - name: Run MODX → Firestore sync
        id: sync
        run: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.full_backfill == 'true') && 'npm run sync:modx:full' || 'npm run sync:modx' }}
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          MODX_FORCE_DOC_ID: ${{ github.event.inputs.modx_doc_id }}
          MODXDB_HOST: ${{ secrets.MODXDB_HOST }}
          MODXDB_PORT: ${{ secrets.MODXDB_PORT }}
          MODXDB_USER: ${{ secrets.MODXDB_USER }}
          MODXDB_DATABASE: ${{ secrets.MODXDB_DATABASE }}
          MODXDB_PASSWORD: ${{ secrets.MODXDB_PASSWORD }}
          FIREBASE_ADMIN_KEY: ${{ secrets.FIREBASE_ADMIN_KEY }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          MODX_ASSET_ORIGIN: ${{ secrets.MODX_ASSET_ORIGIN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}

      - name: Commit redirect manifest updates
        if: success() && steps.sync.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          if git diff --quiet -- src/lib/data/receptsarok-redirects.json; then
            echo "No redirect manifest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/receptsarok-redirects.json
          git commit -m "chore(sync): update receptsarok redirect manifest from MODX sync"
          git push

      - name: Revoke GitHub Actions runner IP from cPanel Remote MySQL
        if: always() && steps.cpanel_mysql.outcome == 'success'
        continue-on-error: true
        env:
          CPANEL_URL: ${{ secrets.CPANEL_URL }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
        run: bash scripts/cpanel-remote-mysql-ip.sh remove "${{ steps.cpanel_mysql.outputs.ip }}"
